<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Empresa - TalentFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-theme-empresa">

    <div data-tf-header data-context="public" data-active="company-login"></div>

    <div class="auth-container">
        <div class="glass-card auth-card fade-in-up">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Acesso Corporativo</h2>
                <p class="text-white-50 small">Entre para gerenciar vagas, candidaturas e dados da empresa.</p>
            </div>

            <form id="loginEmpresaForm">
                <div class="mb-3">
                    <label class="form-label">Email Corporativo</label>
                    <div class="input-group">
                        <span class="input-group-text form-control-glass border-end-0"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="loginEmail" class="form-control form-control-glass border-start-0" placeholder="exemplo@empresa.com" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text form-control-glass border-end-0"><i class="bi bi-lock"></i></span>
                        <input type="password" id="loginSenha" class="form-control form-control-glass border-start-0" placeholder="********" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-empresa w-100 py-2 fw-bold rounded-pill hover-scale mt-3">Acessar Painel</button>
            </form>

            <div class="text-center mt-4 pt-3 border-top border-light border-opacity-25">
                <p class="small text-white-50 mb-0">Ainda não cadastrou sua empresa?</p>
                <a href="empresa-cadastro.html" class="text-white fw-bold text-decoration-none">Cadastrar empresa</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cabecalho.js"></script>
    <script src="js/script.js"></script>
    <script src="js/empresa-auth.js"></script>
</body>
</html>
