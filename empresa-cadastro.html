<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Empresa - TalentFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-theme-empresa">

    <div data-tf-header data-context="public" data-active="company-login"></div>

    <div class="auth-container">
        <div class="glass-card auth-card auth-card-lg fade-in-up">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Cadastre sua empresa</h2>
                <p class="text-white-50 small">Crie seu acesso para publicar vagas e acompanhar os melhores talentos.</p>
            </div>

            <form id="cadastroEmpresaForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nome da Empresa</label>
                        <input type="text" id="cadastroNome" class="form-control form-control-glass" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">CNPJ</label>
                        <input type="text" id="cadastroCnpj" class="form-control form-control-glass" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Telefone</label>
                        <input type="text" id="cadastroContato" class="form-control form-control-glass" required>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">E-mail Corporativo</label>
                        <input type="email" id="cadastroEmail" class="form-control form-control-glass" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Senha</label>
                        <input type="password" id="cadastroSenha" class="form-control form-control-glass" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Descrição da Empresa</label>
                        <textarea id="cadastroDescricao" class="form-control form-control-glass" rows="3"></textarea>
                    </div>
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-empresa w-100 py-3 fw-bold rounded-pill hover-scale">Finalizar Cadastro</button>
                    </div>
                </div>
            </form>

            <div class="text-center mt-4 pt-3 border-top border-light border-opacity-25">
                <p class="small text-white-50 mb-0">Já possui acesso?</p>
                <a href="empresa-login.html" class="text-white fw-bold text-decoration-none">Entrar como empresa</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cabecalho.js"></script>
    <script src="js/script.js"></script>
    <script src="js/empresa-auth.js"></script>
</body>
</html>
